services:
  shit-sui-mcp:
    build: .
    container_name: shit-sui-mcp
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
    networks:
      - mcp

  caddy:
    image: caddy:2-alpine
    container_name: shit-sui-caddy
    restart: unless-stopped
    depends_on:
      - shit-sui-mcp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mcp

networks:
  mcp:

volumes:
  caddy_data:
  caddy_config:
